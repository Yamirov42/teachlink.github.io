    <title>TeachLink| Кабинет</title>

</head>
<body>
    <div class="app-container">

            </div>
        </div>
        
        <div class="content-panel" id="profilePanel">
            <div class="profile-card" id="profileInfo"></div>
        </div>
        
        <footer>ВАШ РЕПЕТИТОР УМЕЕТ В СВОЁ ДЕЛО</footer>
    </div>
